version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: netlab-db
    environment:
      POSTGRES_DB: netlab
      POSTGRES_USER: netlab
      POSTGRES_PASSWORD: netlab_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netlab"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: netlab-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://netlab:netlab_secret@db:5432/netlab
      DATABASE_URL_SYNC: postgresql://netlab:netlab_secret@db:5432/netlab
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: netlab-ui
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  pgdata:
